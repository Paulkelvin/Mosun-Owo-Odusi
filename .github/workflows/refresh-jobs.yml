name: Daily Job Refresh

on:
  schedule:
    # Run daily at 6:00 AM UTC (7:00 AM WAT for Nigeria)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  refresh-opportunities:
    runs-on: ubuntu-latest
    env:
      REFRESH_API_KEY: ${{ secrets.REFRESH_API_KEY }}
    
    steps:
      - name: Refresh Job Opportunities
        run: |
          echo "🔄 Triggering job refresh..."

          DEFAULT_KEY="mosun-refresh-2024"
          API_KEY="${REFRESH_API_KEY:-$DEFAULT_KEY}"

          call_refresh() {
            local key="$1"
            curl -s -L --max-redirs 5 -w "\n%{http_code}" -X POST \
              https://mosunowoodusi.com/api/opportunities/refresh \
              -H "Authorization: Bearer ${key}" \
              -H "Content-Type: application/json"
          }
          
          response=$(call_refresh "$API_KEY")
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          # If secret is set but mismatched, retry once with the route default.
          if [ "$http_code" -eq 401 ] && [ "$API_KEY" != "$DEFAULT_KEY" ]; then
            echo "🔁 Received 401 with configured secret, retrying with default key..."
            response=$(call_refresh "$DEFAULT_KEY")
            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')
          fi
          
          echo "📡 Response Code: $http_code"
          echo "📊 Response Body: $body"
          
          if [ "$http_code" -eq 200 ] || [ "$http_code" -eq 202 ]; then
            echo "✅ Job refresh accepted successfully!"
          else
            echo "❌ Job refresh failed with code $http_code"
            exit 1
          fi

      - name: Notify on Success
        if: success()
        run: |
          echo "🎉 Daily job refresh completed at $(date)"
          
      - name: Notify on Failure
        if: failure()
        run: |
          echo "⚠️ Daily job refresh failed at $(date)"

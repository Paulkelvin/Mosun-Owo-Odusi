name: Daily Job Refresh

on:
  schedule:
    # Run daily at 6:00 AM UTC (7:00 AM WAT for Nigeria)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  refresh-opportunities:
    runs-on: ubuntu-latest
    env:
      REFRESH_API_KEY: ${{ secrets.REFRESH_API_KEY }}
    
    steps:
      - name: Refresh Job Opportunities
        run: |
          echo "🔄 Triggering job refresh..."

          DEFAULT_KEY="mosun-refresh-2024"
          API_KEY="${REFRESH_API_KEY:-$DEFAULT_KEY}"
          REFRESH_URL="https://mosun-owo-odusi.vercel.app/api/opportunities/refresh"

          if [ -z "${REFRESH_API_KEY}" ]; then
            echo "ℹ️ GitHub secret REFRESH_API_KEY is not set; using default fallback key."
          fi

          call_refresh() {
            local key="$1"
            curl -s -L --max-redirs 5 -w "\n%{http_code}" -X POST \
              "$REFRESH_URL" \
              -H "Authorization: Bearer ${key}" \
              -H "X-API-Key: ${key}" \
              -H "Content-Type: application/json"
          }

          keys_to_try=("$API_KEY")
          if [ "$API_KEY" != "$DEFAULT_KEY" ]; then
            keys_to_try+=("$DEFAULT_KEY")
          fi

          success=false
          http_code=""
          body=""

          for key in "${keys_to_try[@]}"; do
            response=$(call_refresh "$key")
            http_code=$(echo "$response" | tail -n1 | tr -d '\r')
            body=$(echo "$response" | sed '$d')

            if [ "$http_code" = "200" ] || [ "$http_code" = "202" ]; then
              success=true
              break
            fi

            if [ "$http_code" = "401" ] && [ "$key" != "$DEFAULT_KEY" ]; then
              echo "🔁 Received 401 with configured secret, trying default key..."
            fi
          done
          
          echo "📡 Response Code: $http_code"
          echo "📊 Response Body: $body"
          
          if [ "$success" = true ]; then
            echo "✅ Job refresh accepted successfully!"
          else
            echo "❌ Job refresh failed with code $http_code"
            exit 1
          fi

      - name: Notify on Success
        if: success()
        run: |
          echo "🎉 Daily job refresh completed at $(date)"
          
      - name: Notify on Failure
        if: failure()
        run: |
          echo "⚠️ Daily job refresh failed at $(date)"
